<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hami Video 推播 PoC - 寫實商務版</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; line-height: 1.6; }
        
        /* 頂部導覽列 (真實登入 UI) */
        .navbar { background-color: #1e1e1e; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;}
        .user-status { display: flex; align-items: center; gap: 15px; }
        .user-profile { color: #888; font-family: monospace; font-size: 16px; }
        
        /* 按鈕樣式 */
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .login-btn { padding: 8px 15px; background: #e50914; color: white; font-size: 14px; }
        .login-btn:hover { background: #b20710; }
        
        .subscribe-btn { padding: 12px 15px; background: #007bff; color: white; font-size: 16px; width: 100%; margin-top: 10px; }
        .subscribe-btn:hover { background: #0056b3; }
        .subscribe-btn:disabled { background: #444; color: #777; cursor: not-allowed; }
        
        /* 電影卡片區塊 */
        .movie-card { border: 1px solid #333; padding: 20px; border-radius: 8px; max-width: 400px; background-color: #1e1e1e; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .tag { background: #e50914; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .title { font-size: 24px; margin: 10px 0; font-weight: bold; }
        .desc { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        
        .soft-prompt { border: 1px dashed #555; padding: 15px; border-radius: 8px; background: rgba(255, 255, 255, 0.05); text-align: center; }
        #statusMsg { font-size: 14px; margin-top: 15px; color: #ffcc00; font-weight: bold; white-space: pre-line; }
    </style>
</head>
<body>

    <!-- 頂部導覽列：負責處理登入 -->
    <div class="navbar">
        <div style="font-weight: bold; font-size: 18px;">Hami Video</div>
        <div class="user-status">
            <span class="user-profile" id="userDisplay">訪客 (尚未登入)</span>
            <button class="login-btn" id="loginBtn">模擬登入</button>
        </div>
    </div>

    <!-- 電影介紹與訂閱區塊 -->
    <div class="movie-card">
        <span class="tag">即將上架</span>
        <div class="title">🎬 沙丘：第二部 (Dune: Part Two)</div>
        <div class="desc">保羅亞崔迪與荃妮聯手，對毀滅他家族的陰謀者展開報復。史詩級科幻巨作即將登陸！</div>

        <div class="soft-prompt">
            <p style="margin-top: 0; font-size: 15px; color: #ddd;">想第一時間知道上架消息嗎？</p>
            <button class="subscribe-btn" id="subscribeBtn" disabled>請先登入以開啟通知</button>
            <div id="statusMsg"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyADEqZXHbG9uNUowuYhNOlztU2Xai06Wr4",
            authDomain: "modga1.firebaseapp.com",
            databaseURL: "https://modga1.firebaseio.com",
            projectId: "modga1",
            storageBucket: "modga1.firebasestorage.app",
            messagingSenderId: "643764984083",
            appId: "1:643764984083:web:ef07fd1bc6b8b2cb2b62e6"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        
        const VAPID_KEY = 'BNNXW2IbwkqaRAqHoRbo9gPtiPQod5DhzaEOhaIq0Jk4Pbcxq7gGR9loDIQPnP8jwtqK0dkzzHjFAcZGb2pBfBI';
        
        // 🔔【後端 API 網址】您部署好的 Python Cloud Function
        const BACKEND_API_URL = 'https://asia-east1-modga1.cloudfunctions.net/save_fcm_token';

        // UI 元素
        const loginBtn = document.getElementById('loginBtn');
        const userDisplay = document.getElementById('userDisplay');
        const subscribeBtn = document.getElementById('subscribeBtn');
        const statusMsg = document.getElementById('statusMsg');

        // 系統狀態
        let currentUserId = null;

        // ==========================================
        // 動作一：使用者手動點擊「登入」
        // ==========================================
        loginBtn.addEventListener('click', () => {
            // 亂數產生客戶姓名
            currentUserId = "User_" + Math.floor(Math.random() * 10000);
            
            // 更新 UI 顯示已登入
            userDisplay.innerText = `👤 ${currentUserId}`;
            userDisplay.style.color = "#00ffcc";
            loginBtn.style.display = "none"; // 隱藏登入按鈕

            // 解鎖訂閱按鈕
            subscribeBtn.disabled = false;
            
            // 檢查是否曾經允許過通知，改變按鈕文字以符合邏輯
            if (Notification.permission === 'granted') {
                subscribeBtn.innerText = "🔔 綁定此帳號接收通知";
            } else {
                subscribeBtn.innerText = "🔔 允許接收新片上架通知";
            }
        });

        // ==========================================
        // 動作二：使用者「手動點擊」訂閱推播
        // ==========================================
        subscribeBtn.addEventListener('click', async () => {
            // 防呆：沒登入不能按
            if (!currentUserId) return; 

            subscribeBtn.innerText = "授權與處理中...";
            subscribeBtn.disabled = true;
            statusMsg.innerText = "";

            try {
                // 1. 喚起瀏覽器權限視窗 (若之前已允許，會直接通過)
                const permission = await Notification.requestPermission();
                
                if (permission !== 'granted') {
                    subscribeBtn.innerText = "🔔 重新嘗試訂閱";
                    subscribeBtn.disabled = false;
                    statusMsg.innerText = "您拒絕了通知權限，無法收到提醒喔！";
                    statusMsg.style.color = "#ff4444";
                    return;
                }

                // 2. 權限通過，註冊保全並取得 Token
                statusMsg.innerText = "正在取得安全憑證...";
                statusMsg.style.color = "#aaa";
                // 🌟 改成加上版本號：
                const SW_VERSION = "1.0"; // 每次大改版，就把這裡改掉 (例如 2.1, 3.0...)
                const registration = await navigator.serviceWorker.register(`/firebase-messaging-sw.js?v=${SW_VERSION}`);
                await navigator.serviceWorker.ready;
                
                const currentToken = await getToken(messaging, { 
                    vapidKey: VAPID_KEY,
                    serviceWorkerRegistration: registration 
                });

                if (!currentToken) {
                    throw new Error("無法從 Firebase 取得 Token");
                }

                // 3. 準備 Payload，暗自發送給 Python 後端 (Cloud Function)
                statusMsg.innerText = "正在將資料安全同步至伺服器...";
                
                const payload = {
                    username: currentUserId,
                    token: currentToken,
                    device: navigator.userAgent.includes('Edg') ? 'Edge Web' : 'Chrome Web'
                };

                const response = await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                // 4. 根據後端回應更新 UI
                if (result.status === "success") {
                    subscribeBtn.innerText = "✅ 已成功訂閱";
                    statusMsg.innerText = `🎉 恭喜綁定成功！\n${currentUserId} 將會第一時間收到《沙丘2》的專屬推播。`;
                    statusMsg.style.color = "#00ff00";
                } else {
                    throw new Error(result.error || "伺服器未知的錯誤");
                }

            } catch (err) {
                console.error("訂閱流程發生錯誤：", err);
                subscribeBtn.innerText = "🔔 重新嘗試訂閱";
                subscribeBtn.disabled = false;
                statusMsg.innerText = "發生錯誤：" + err.message;
                statusMsg.style.color = "#ff4444";
            }
        });

        // ==========================================
        // 網頁開啟中收到推播 (前景)
        // ==========================================
        onMessage(messaging, async (payload) => {
            console.log("前景收到推播：", payload);
            
            const registration = await navigator.serviceWorker.getRegistration();
            if (registration) {
                // 從 data 裡面撈取資料
                const data = payload.data || {};
                const notificationTitle = data.title || 'Hami Video 通知';
                
                const notificationOptions = {
                    body: data.body,
                    icon: '/favicon.ico',
                    image: data.image,
                    requireInteraction: true,
                    actions:[
                        { action: 'watch', title: '▶️ 觀賞' },
                        { action: 'download', title: '⬇️ 訂閱' } // 這裡修正為訂閱
                    ],
                    data: data
                };

                registration.showNotification(notificationTitle, notificationOptions);
            }
        });


    </script>
</body>
</html>
